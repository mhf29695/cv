    <script>  
        jQuery(document).ready(function($){ // wait for the document to load
            $("#main").css({
                    'margin-top' : $('.nav-header').outerHeight() + 'px'
            });
        });
        $(window).resize(function(){
            $("#main").css({
                    'margin-top' : $('.nav-header').outerHeight() + 'px'
            });
        });
        const viewer = document.getElementById("viewer");
        const main = document.getElementById("main");
        const header = document.getElementById("header");
        const footer = document.getElementById("footer");
        const pageBlur = document.getElementById("blur");
        const image = document.getElementById("image");
        const gallery = document.getElementById("gallery");
        var timeout = null;

        pageBlur.addEventListener("keydown", function(event) {
            if (event.key === "Escape") {
                closeImage();
            }
        });

        function zoomImage() {
            if (image.style.cursor == "zoom-in") {
                zoomIn();
            } else {
                zoomOut();
            }
        }
        function zoomIn() {
                image.style.cursor = "zoom-out";
                let {x, y} = getCursorPos(image);
                w = image.width;
                h = image.height;
                image.style.scale = "2.5";
                image.style.aspectRatio = "auto " + image.naturalWidth + " / " + image.naturalHeight;
                image.parentElement.style.overflow = "scroll";
                image.parentElement.scrollLeft = x * 1.5;
                image.parentElement.scrollTop = y * 1.5;
        }
        function zoomOut() {
            image.style.cursor = "zoom-in";
            image.style.scale = "1";
            image.style.aspectRatio = "auto " + image.parentElement.width + " / " + image.parentElement.height;
            image.parentElement.style.overflow = "initial";
        }
        function openImage(galleryItem) {
            pageBlur.inert = false;
            zoomOut(image);
            main.style.userSelect = "none";
            header.style.userSelect = "none";
            footer.style.userSelect = "none";
            main.style.animation = "blur 1s";
            header.style.animation = "blur 1s";
            footer.style.animation = "blur 1s";
            pageBlur.style.display = "flex";
            pageBlur.style.animation = "reveal 1s";
            let src = galleryItem.children[1].src;
            let alt = galleryItem.children[1].alt;
            document.getElementById("image-title").innerText = alt;
            document.getElementById("prev").onclick = function() { prevImage(galleryItem); };
            document.getElementById("next").onclick = function() { nextImage(galleryItem); };
            image.src = src;
                    
            image.style.animation = "fadeIn 1.5s";
            clearTimeout(timeout);
            timeout = setTimeout(function(){
                main.style.filter = "blur(10px)";
                header.style.filter = "blur(10px)";
                footer.style.filter = "blur(10px)";
            }, 950);
            document.body.style.height = "100%";
            document.body.style.overflow = "hidden";
            viewer.focus();
        }
        function nextImage(galleryItem) {
            let next = galleryItem.nextElementSibling;
            if (next == null) {
                next = gallery.firstElementChild;
            }
            openImage(next);
        }
        function prevImage(galleryItem) {
            let prev = galleryItem.previousElementSibling;
            if (prev == null) {
                prev = gallery.lastElementChild;
            }
            openImage(prev);
        }
        function closeImage() {
            pageBlur.inert = true;
            pageBlur.style.animation = "unreveal 1s";
            main.style.animation = "unblur 1s";
            header.style.animation = "unblur 1s";
            footer.style.animation = "unblur 1s";
            viewer.style.animation = "fadeOut 1.5s";
            main.style.userSelect = "initial";
            header.style.userSelect = "initial";
            footer.style.userSelect = "initial";
            clearTimeout(timeout);
            timeout = setTimeout(function(){
                main.style.filter = "none";
                header.style.filter = "none";
                footer.style.filter = "none";
                pageBlur.style.display = "none";
                zoomOut(image);
            }, 950);
            document.body.style.height = "initial";
            document.body.style.overflow = "initial";
        }
        /* Courtesy of https://www.w3schools.com/howto/howto_js_image_zoom.asp */
        function getCursorPos(img) {
            var a, x = 0, y = 0;
            e = window.event;
            /* Get the x and y positions of the image: */
            a = img.getBoundingClientRect();
            /* Calculate the cursor's x and y coordinates, relative to the image: */
            x = e.pageX - a.left;
            y = e.pageY - a.top;
            /* Consider any page scrolling: */
            x = x - window.pageXOffset;
            y = y - window.pageYOffset;
            return {x : x, y : y};
        }
    </script>
</html>
