<!doctype html>
<html lang="en">
    <head>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
        <link rel="stylesheet" href="css/global.css" />
        <link rel="stylesheet" href="css/film-and-photography.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
            rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
            rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
            rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
            rel="stylesheet" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Miles Hayden Flores || Film and Photography Gallery</title>
    </head>
    <body>

        <div id="blur" tabindex="-1">
            <div id="viewer" tabindex="-1">
                <header>
                    <div id="image-info">
                        <h1 id="image-title"></h1>
                        <h2 id="image-subtitle"></h2>
                    </div>
                    <button type="button" class="close" onclick='closeImage()' tabindex="0"></button>
                </header>
                <button type="button" class="prev" id="prev-photo">&#8249;</button>
                <div id="image-container">
                    <img id="image" style="cursor: zoom-in;" onclick="zoomImage()"/>
                </div>
                <button type="button" class="next" id="next-photo">&#8250;</button>
            </div>
        </div>
        
        <header id="header" class="nav-header">
            <nav id="toolbar">
                <p class="name">Miles Hayden Flores</p>
                <div class="page-tab">
                    <a href="./">Computer Science</a>
                </div>
                <div class="page-tab">
                    <p class="active">Film and Photography</p>
                </div>
                <div id="contact">
                    <p>+1 (470) 302-6084</p>
                    <a href="mailto:mileshflores@gmail.com">mileshflores@gmail.com</a>
                </div>
            </nav>
        </header>

        <main id="main">
            <section id="film">
                <div class="fadeDelayed0"><h1 class="title">Film Showcase</h1></div>
                <div id="carousel">
                    <div id="player" class="fadeDelayed1">
                        <iframe id="video" src="" title="YouTube video player" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope;" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                        <div id="video-info"></div>
                    </div>
                    <div id="carousel-bar" class="carousel-bar fadeDelayed2">
                        <div class="button-container" id="prev-button" onclick="prevVideo()">
                            <button type="button" class="prev">&#8249;</button>
                        </div>
                        <div id="thumbnail-container">
                            <div id="thumbnails">
                                <div class="carousel-item" onclick="focusVideo(this)"
                                    data-source="H5c3rAXUH2c"
                                    data-title="No Time to Pie"
                                    data-desc="Directed, edited, and shot by Miles Flores.
                                        <br />
                                        <br />
                                        Starring Joe Burke as Aaron, Wilhemina Quiroz as Bex.
                                        <br />
                                        Sound Recordist: Libby Rigelman">
                                    <img src="" onerror="missing(this)" />
                                </div>
                            </div>
                        </div>
                        <div class="button-container" id="next-button" onclick="nextVideo()">
                            <button type="button" class="next">&#8250;</button>
                        </div>
                    </div>
                </div>
            </section>
            <section id="photography">
                <div class="fadeDelayed3"><h1 class="title">Photo Gallery</h1></div>
                <div id="gallery" class="fadeDelayed4">
                    <div class="gallery-item" onclick="openImage(this)"
                        data-title="Under the Gaze of Giants"
                        data-subtitle="Silverton, CO, 2023">
                        <div class="overlay">View</div>
                        <img src="gallery/DSC_6766.png" alt="DSC_6766.png" />
                    </div>
                    <div class="gallery-item" onclick="openImage(this)"
                        data-title="Abandoned Bridge"
                        data-subtitle="Silverton, CO, 2023">
                        <div class="overlay">View</div>
                        <img src="gallery/DSC_6877.png" alt="An old bridge sandwiched between mountains" />
                    </div>
                    <div class="gallery-item" onclick="openImage(this)"
                        data-title="A Hidden Valley"
                        data-subtitle="Silverton, CO, 2023">
                        <div class="overlay">View</div>
                        <img src="gallery/DSC_6886.png" alt="A train going by a river in a valley" />
                    </div>
                    <div class="gallery-item" onclick="openImage(this)"
                        data-title="In the Mountains?!"
                        data-subtitle="Great Sand Dunes, CO, 2023">
                        <div class="overlay">View</div>
                        <img src="gallery/DSC_6902.png" alt="Sand dunes with mountains in the background" />
                    </div>
                    <div class="gallery-item" onclick="openImage(this)"
                        data-title="Early Morning with a Cow"
                        data-subtitle="Sanbona Wildlife Reserve, SA, 2024">
                        <div class="overlay">View</div>
                        <img src="gallery/DSC_7052.png" alt="A cow gazes over a field" />
                    </div>
                    <div class="gallery-item" onclick="openImage(this)"
                        data-title="Town by the Oceanfront"
                        data-subtitle="Table Mountain, Cape Town, SA, 2024">
                        <div class="overlay">View</div>
                        <img src="gallery/DSC_7082.png" alt="A town by the ocean from atop a mountain" />
                    </div>
                </div>
            </section>
        </main>

    <footer id="footer">
        <span><a href="contact.html">Miles Hayden Flores</a> &copy; 2026</span>
        <a href="https://linkedin.com/in/miles-flores-5b12bb324" target="_blank"><i
                class="fa fa-brands fa-linkedin"></i></a>
    </footer>
    </body>
    <script>  
        const viewer = document.getElementById("viewer");
        const main = document.getElementById("main");
        const header = document.getElementById("header");
        const footer = document.getElementById("footer");
        const pageBlur = document.getElementById("blur");
        const image = document.getElementById("image");
        const gallery = document.getElementById("gallery");
        const prevButton = document.getElementById("prev-photo");
        const nextButton = document.getElementById("next-photo");

        const video = document.getElementById("video");
        const videoList = document.getElementById("thumbnails");

        var timeout = null;

        pageBlur.addEventListener("keydown", function(event) {
            if (event.key === "Escape") {
                closeImage();
            } else if (event.key === "ArrowLeft") {
                prevButton.onclick.apply(prevButton);
            } else if (event.key === "ArrowRight") {
                nextButton.onclick.apply(nextButton);
            }
        });

        function zoomImage() {
            if (image.style.cursor == "zoom-in") {
                zoomIn();
            } else {
                zoomOut();
            }
        }
        function zoomIn() {
                image.style.cursor = "zoom-out";
                let {x, y} = getCursorPos(image);
                image.style.justifySelf = "unset";
                w = image.width;
                h = image.height;
                image.style.scale = "2.5";
                image.style.aspectRatio = "auto " + image.naturalWidth + " / " + image.naturalHeight;
                image.parentElement.style.overflow = "scroll";
                image.parentElement.scrollLeft = x * 1.5;
                image.parentElement.scrollTop = y * 1.5;
        }
        function zoomOut() {
            image.style.justifySelf = "center";
            image.style.cursor = "zoom-in";
            image.style.scale = "1";
            image.style.aspectRatio = "auto " + image.parentElement.width + " / " + image.parentElement.height;
            image.parentElement.style.overflow = "initial";
        }
        function openImage(galleryItem) {
            pageBlur.inert = false;
            zoomOut(image);
            main.style.userSelect =
            header.style.userSelect =
            footer.style.userSelect =  "none";
            main.style.animation = header.style.animation = footer.style.animation = "blur 1s";
            pageBlur.style.display = "flex";
            pageBlur.style.animation = "reveal 1s";
            let src = galleryItem.children[1].src;
            let title = galleryItem.getAttribute("data-title");
            let subtitle = galleryItem.getAttribute("data-subtitle");
            document.getElementById("image-title").innerText = title;
            document.getElementById("image-subtitle").innerText = subtitle;
            prevButton.onclick = function() { prevImage(galleryItem); };
            nextButton.onclick = function() { nextImage(galleryItem); };
            image.src = src;
                    
            image.style.animation = "fadeIn 1.5s";
            clearTimeout(timeout);
            timeout = setTimeout(function(){
                main.style.filter =
                header.style.filter =
                footer.style.filter = "blur(10px)";
            }, 950);
            document.body.style.height = "100%";
            document.body.style.overflow = "hidden";
            viewer.focus();
        }
        function nextImage(galleryItem) {
            let next = galleryItem.nextElementSibling;
            if (next == null) {
                next = gallery.firstElementChild;
            }
            openImage(next);
        }
        function prevImage(galleryItem) {
            let prev = galleryItem.previousElementSibling;
            if (prev == null) {
                prev = gallery.lastElementChild;
            }
            openImage(prev);
        }
        function closeImage() {
            pageBlur.inert = true;
            pageBlur.style.animation = "unreveal 1s";
            main.style.animation =
            header.style.animation =
            footer.style.animation = "unblur 1s";
            viewer.style.animation = "fadeOut 1.5s";
            main.style.userSelect =
            header.style.userSelect =
            footer.style.userSelect = "initial";
            clearTimeout(timeout);
            timeout = setTimeout(function(){
                main.style.filter =
                header.style.filter =
                footer.style.filter =
                pageBlur.style.display = "none";
                zoomOut(image);
            }, 950);
            document.body.style.height =
            document.body.style.overflow = "initial";
        }
        /* Courtesy of https://www.w3schools.com/howto/howto_js_image_zoom.asp */
        function getCursorPos(img) {
            var a, x = 0, y = 0;
            e = window.event;
            /* Get the x and y positions of the image: */
            a = img.getBoundingClientRect();
            /* Calculate the cursor's x and y coordinates, relative to the image: */
            x = e.pageX - a.left;
            y = e.pageY - a.top;
            /* Consider any page scrolling: */
            x = x - window.pageXOffset;
            y = y - window.pageYOffset;
            return {x : x, y : y};
        }

        function moveCarousel(offset) {
            var slide = [
                { transform: "translateX(" + $('.carousel-item').outerWidth() * offset * -1 + "px)" },
                { transform: "translateX(0px)" }
            ]
            video.src="";
            document.getElementById("carousel-bar").setAttribute("inert", '');
            $("#thumbnails").css({
                'animation': 'unset'
            });
            document.getElementById("thumbnails").offsetHeight;
            $("#thumbnails").css({
                'margin-top': '.6em',
                'margin-bottom': '.6em',
            });
            document.getElementById("thumbnails").animate(slide, { duration: 1000, easing: "ease" })
            for (let elem of videoList.children) {
                elem.style.order = (parseInt(elem.style.order) + offset + videoList.children.length) % videoList.children.length;
                elem.classList.remove("selected");
                if (elem.style.order == parseInt(videoList.children.length / 2)) {
                    clearTimeout(timeout);
                    timeout = setTimeout(function(){
                        updateFocus(elem);
                        $("#thumbnails").css({
                            'margin-top': '0px',
                            'margin-bottom': '0px',
                        });
                        document.getElementById("carousel-bar").removeAttribute("inert");
                    }, 1000)
                }
            }
        }

        function updateFocus(carouselItem) {
            carouselItem.classList.add("selected");
            // video.style.aspectRatio = this.video.naturalWidth / this.video.naturalHeight; FIGURE THIS OUT
            video.src = "https://www.youtube.com/embed/" + carouselItem.getAttribute("data-source");
            document.getElementById("video-info").innerHTML =
                "<h4>" + carouselItem.getAttribute("data-title") + "</h4>"
                + "<p>" + carouselItem.getAttribute("data-desc") + "</p>";
        }

        function focusVideo(carouselItem) {
            let offset = parseInt(videoList.children.length / 2) - carouselItem.style.order;
            if (offset != 0) {
                moveCarousel(offset);
            }
        }

        function nextVideo() {
            moveCarousel(-1);
        }

        function prevVideo() {
            moveCarousel(1);
        }
        
        function missing(img) {
            img.classList.add('missing');
            img.src = ' ';
        }

        let l = parseInt(videoList.children.length);
        let i = l - 1 + ((l == 2) ? 1 : 0);
        let tempList = new DocumentFragment();
        if (l > 1) {
            for (let elem of videoList.children) {
                elem.firstElementChild.src = "https://img.youtube.com/vi/" + elem.getAttribute("data-source") + "/maxresdefault.jpg";
                let tempNode = elem.cloneNode(true)
                tempNode.style.order = (l + ++i) % (l * 2 + ((l == 2) ? 2 : 0));
                tempList.append(tempNode);
            }
        } else {
            let video = videoList.firstElementChild;
            video.firstElementChild.src = "https://img.youtube.com/vi/" + video.getAttribute("data-source") + "/maxresdefault.jpg";
            for (let button of document.getElementsByClassName('button-container')) {
                button.classList.add("hidden");
            }
        }

        if (l == 2) {
            let fauxEnd = videoList.firstElementChild.cloneNode(true);
            fauxEnd.style.order = (l + ++i) % (l * 2 + ((l == 2) ? 2 : 0));
            tempList.append(fauxEnd);
            fauxEnd = videoList.lastElementChild.cloneNode(true);
            fauxEnd.style.order = (l + ++i) % (l * 2 + ((l == 2) ? 2 : 0));;
            tempList.append(fauxEnd);
        }
        for (let elem of videoList.children) {
            elem.style.order = (l + ++i) % (l * 2 + ((l == 2) ? 2 : 0));
        }
        videoList.append(tempList);
        updateFocus(videoList.firstElementChild);

        jQuery(document).ready(function($){ // wait for the document to load
            let l = (videoList.children.length <= 5) ? 0 : videoList.children.length;
            var marginOffset = (l % 2 == 0 && l > 6) ? ' 0 -' + $('.carousel-item').outerWidth() * (1.5 + l / 4) + 'px' : ' 0 -' + $('.carousel-item').outerWidth() * (1 + l / 4) + 'px';
            $("#main").css({
                    'margin-top' : $('.nav-header').outerHeight() + 'px'
            });
            $("#thumbnails").css({
                    'margin' : (videoList.children.length != 1) ? '0 -' + $('.carousel-item').outerWidth() * (.5 + (l / 4) + ((l == 6) ? -.5 : 0) + ((l == 0) ? 1 : 0)) + 'px' + ((l >= 0) ? marginOffset : '') : ''
            });
        });
        $(window).resize(function(){
            let l = (videoList.children.length <= 5) ? 0 : videoList.children.length;
            var marginOffset = (l % 2 == 0 && l > 6) ? ' 0 -' + $('.carousel-item').outerWidth() * (1.5 + l / 4) + 'px' : ' 0 -' + $('.carousel-item').outerWidth() * (1 + l / 4) + 'px';
            $("#main").css({
                    'margin-top' : $('.nav-header').outerHeight() + 'px'
            });
            $("#thumbnails").css({
                    'margin' : (videoList.children.length != 1) ? '0 -' + $('.carousel-item').outerWidth() * (.5 + (l / 4) + ((l == 6) ? -.5 : 0) + ((l == 0) ? 1 : 0)) + 'px' + ((l >= 0) ? marginOffset : '') : ''
            });
        });
    </script>
</html>
