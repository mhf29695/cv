<!doctype html>
<html lang="en">
    <head>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

        <link rel="stylesheet" href="css/global.css" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
            rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"

            href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
            rel="stylesheet" />

            rel="stylesheet" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <body>

        <div id="blur">
            <div id="viewer">
            <header>
                <h1 id="image-title"></h1>
                <button type="button" class="close" onclick='closeImage()'></button>
            </header>
            <div id="image-container">
                <img id="image" />
                </div>
            </div>
        </div>
        
        <header id="header" class="nav-header">
            <nav id="toolbar">
                <p>Miles Hayden Flores</p>
                <div id="mode">
                    <a href="computer-science.html">Film and Photography Gallery</a>
                </div>
                <div id="contact">
                    <p>+1 (470) 302-6084</p>
                    <a href="mailto:mileshflores@gmail.com">mileshflores@gmail.com</a>
                </div>
            </nav>
        </header>
        <main id="page">
            <div id="gallery">
                <div class="gallery-item" onclick="openImage(this)">
                    <div class="overlay"></div>
                    <img src="gallery/DSC_6710.JPG" alt="DSC_6710.JPG" />
                </div>
                <div class="gallery-item">
                    <img src="gallery/DSC_6710.JPG" alt="" />
                </div>
                <div class="gallery-item">
                    <img src="gallery/DSC_6710.JPG" alt="" />
                </div>
                <div class="gallery-item">
                    <img src="gallery/DSC_6710.JPG" alt="" />
                </div>
                <div class="gallery-item">
                    <img src="gallery/DSC_6710.JPG" alt="" />
                </div>
                <div class="gallery-item">
                    <img src="gallery/DSC_6710.JPG" alt="" />
                </div>
            </div>
        </main>
    </body>
    <script>  
        jQuery(document).ready(function($){ // wait for the document to load
            $("#page").css({
                    'top' : $('.nav-header').outerHeight() + 'px'
            });
        });
        $(window).resize(function(){
            $("#page").css({
                    'top' : $('.nav-header').outerHeight() + 'px'
            });
        });

        function openImage(galleryItem) {
            let image = document.getElementById("image");
            document.getElementById("page").style.animation = "blur 1s";
            document.getElementById("header").style.animation = "blur 1s";
            document.getElementById("blur").style.display = "flex";
            document.getElementById("blur").style.animation = "reveal 1s";
            let src = galleryItem.children[1].src;
            let alt = galleryItem.children[1].alt;
            document.getElementById("image-title").innerText = alt;
            image.src = src;
            image.onclick = function(){ zoomImage(image) };
            image.style.cursor = "zoom-in";
                    
            image.style.animation = "fadeIn 1.5s";
            setTimeout(function(){
                document.getElementById("page").style.filter = "blur(10px)";
                document.getElementById("header").style.filter = "blur(10px)";
            }, 1000);
            document.body.style.height = "100%";
            document.body.style.overflow = "hidden";
        }
        function closeImage() {
            let image = document.getElementById("image");
            document.getElementById("blur").style.animation = "unreveal 1s";
            document.getElementById("page").style.animation = "unblur 1s";
            document.getElementById("header").style.animation = "unblur 1s";
            document.getElementById("viewer").style.animation = "fadeOut 1.5s";
            setTimeout(function(){
                document.getElementById("page").style.filter = "none";
                document.getElementById("header").style.filter = "none";
                document.getElementById("blur").style.display = "none";
                image.style.cursor = "zoom-in";
                image.style.scale = "1";
                image.style.aspectRatio = "auto " + image.parentElement.width + " / " + image.parentElement.height;
                image.parentElement.style.overflow = "initial";
            }, 1000);
            document.body.style.height = "initial";
            document.body.style.overflow = "initial";
        }

        function zoomImage(image) {
            if (image.style.cursor == "zoom-in") {
                image.style.cursor = "zoom-out";
                let {x, y} = getCursorPos(image);
                w = image.width;
                h = image.height;
                image.style.scale = "2.5";
                image.style.aspectRatio = "auto " + image.naturalWidth + " / " + image.naturalHeight;
                image.parentElement.style.overflow = "scroll";
                image.parentElement.scrollLeft = x * 1.5;
                image.parentElement.scrollTop = y * 1.5;
            } else {
                image.style.cursor = "zoom-in";
                image.style.scale = "1";
                image.style.aspectRatio = "auto " + image.parentElement.width + " / " + image.parentElement.height;
                image.parentElement.style.overflow = "initial";
            }
        }
        /* Courtesy of https://www.w3schools.com/howto/howto_js_image_zoom.asp */
        function getCursorPos(img) {
            var a, x = 0, y = 0;
            e = window.event;
            /* Get the x and y positions of the image: */
            a = img.getBoundingClientRect();
            /* Calculate the cursor's x and y coordinates, relative to the image: */
            x = e.pageX - a.left;
            y = e.pageY - a.top;
            /* Consider any page scrolling: */
            x = x - window.pageXOffset;
            y = y - window.pageYOffset;
            return {x : x, y : y};
        }
    </script>
</html>
